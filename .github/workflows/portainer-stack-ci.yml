name: Portainer Stack CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'clawteam/**'
    paths:
      - 'docker-compose.portainer.yml'
      - 'ops/caddy/**'
      - 'ops/portainer/**'
      - 'docs/operations/portainer-staging-runbook.md'
      - 'apps/site/**'
      - 'apps/admin/**'
      - 'apps/worker/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
  pull_request:
    branches:
      - main
    paths:
      - 'docker-compose.portainer.yml'
      - 'ops/caddy/**'
      - 'ops/portainer/**'
      - 'docs/operations/portainer-staging-runbook.md'
      - 'apps/site/**'
      - 'apps/admin/**'
      - 'apps/worker/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'

concurrency:
  group: portainer-stack-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-portainer-stack:
    name: Validate Portainer stack files
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Make helper scripts executable
        run: chmod +x ops/portainer/*.sh

      - name: Validate compose configuration with example environment
        run: docker compose --env-file ops/portainer/stack.env.example -f docker-compose.portainer.yml config

      - name: Build Portainer-specific Caddy image
        run: docker build -f ops/caddy/Dockerfile.portainer ops/caddy

      - name: Upload Portainer stack bundle
        uses: actions/upload-artifact@v4
        with:
          name: portainer-stack-bundle
          path: |
            docker-compose.portainer.yml
            ops/caddy/Caddyfile
            ops/caddy/Dockerfile.portainer
            ops/portainer/stack.env.example
            docs/operations/portainer-staging-runbook.md
