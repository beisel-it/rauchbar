name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'clawteam/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Install, Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint workspace
        run: pnpm -r lint

      - name: Test workspace
        run: pnpm -r test

      - name: Build workspace
        run: pnpm -r build

      - name: Typecheck status
        run: |
          echo "::notice::Typecheck is intentionally excluded from required CI for now."
          echo "::notice::apps/site still imports removed @rauchbar/deals-core symbols and must be aligned before pnpm -r typecheck can go green."
