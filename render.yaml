# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
#
# Render Blueprint skeleton for Rauchbar MVP.
# This file encodes the intended service topology and environment contract.
# It is not fully deployable until the referenced Dockerfiles and runtime scripts
# exist in the repo.

previews:
  generation: manual
  expireAfterDays: 5

projects:
  - name: rauchbar
    environments:
      - name: staging
        envVarGroups:
          - name: rauchbar-staging-shared
            envVars:
              - key: NODE_ENV
                value: production
              - key: APP_ENV
                value: staging
              - key: LOG_LEVEL
                value: info
              - key: ALLOW_REAL_EMAIL_SEND
                value: "false"
              - key: ALLOW_REAL_WHATSAPP_SEND
                value: "false"
              - key: SITE_BASE_URL
                value: https://staging.rauchbar.de
              - key: ADMIN_BASE_URL
                value: https://admin-staging.rauchbar.de
              - key: PUBLIC_APP_URL
                value: https://staging.rauchbar.de
              - key: SCRAPER_JOB_QUEUE
                value: scrape-staging
              - key: QUEUE_CONCURRENCY
                value: "2"
        databases:
          - name: rauchbar-postgres-staging
            databaseName: rauchbar
            user: rauchbar
            plan: basic-256mb
            region: frankfurt
            postgresMajorVersion: "18"
            ipAllowList: []
        services:
          - type: keyvalue
            name: rauchbar-redis-staging
            plan: starter
            region: frankfurt
            ipAllowList: []

          - type: web
            runtime: docker
            name: rauchbar-site-staging
            plan: starter
            region: frankfurt
            autoDeployTrigger: checksPass
            dockerContext: .
            dockerfilePath: ./apps/site/Dockerfile
            dockerCommand: corepack pnpm --filter @rauchbar/site start
            healthCheckPath: /health/ready
            domains:
              - staging.rauchbar.de
            buildFilter:
              paths:
                - apps/site/**
                - packages/design-system/**
                - packages/deals-core/**
                - package.json
                - pnpm-workspace.yaml
                - tsconfig.base.json
            envVars:
              - fromGroup: rauchbar-staging-shared
              - key: HOST
                value: 0.0.0.0
              - key: PORT
                value: "10000"
              - key: DATABASE_URL
                fromDatabase:
                  name: rauchbar-postgres-staging
                  property: connectionString
              - key: REDIS_HOST
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: host
              - key: REDIS_PORT
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: port
              - key: SESSION_SECRET
                generateValue: true
              - key: SENTRY_DSN
                sync: false

          - type: web
            runtime: docker
            name: rauchbar-admin-staging
            plan: starter
            region: frankfurt
            autoDeployTrigger: checksPass
            dockerContext: .
            dockerfilePath: ./apps/admin/Dockerfile
            dockerCommand: corepack pnpm --filter @rauchbar/admin start
            healthCheckPath: /health/ready
            domains:
              - admin-staging.rauchbar.de
            buildFilter:
              paths:
                - apps/admin/**
                - packages/design-system/**
                - packages/deals-core/**
                - package.json
                - pnpm-workspace.yaml
                - tsconfig.base.json
            envVars:
              - fromGroup: rauchbar-staging-shared
              - key: HOST
                value: 0.0.0.0
              - key: PORT
                value: "10000"
              - key: DATABASE_URL
                fromDatabase:
                  name: rauchbar-postgres-staging
                  property: connectionString
              - key: REDIS_HOST
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: host
              - key: REDIS_PORT
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: port
              - key: SESSION_SECRET
                generateValue: true
              - key: SENTRY_DSN
                sync: false

          - type: worker
            runtime: docker
            name: rauchbar-worker-staging
            plan: starter
            region: frankfurt
            autoDeployTrigger: checksPass
            dockerContext: .
            dockerfilePath: ./apps/worker/Dockerfile
            dockerCommand: corepack pnpm --filter @rauchbar/worker start
            buildFilter:
              paths:
                - apps/worker/**
                - packages/notifications/**
                - packages/deals-core/**
                - package.json
                - pnpm-workspace.yaml
                - tsconfig.base.json
            envVars:
              - fromGroup: rauchbar-staging-shared
              - key: PORT
                value: "8080"
              - key: WORKER_ROLE
                value: worker
              - key: DATABASE_URL
                fromDatabase:
                  name: rauchbar-postgres-staging
                  property: connectionString
              - key: REDIS_HOST
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: host
              - key: REDIS_PORT
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: port
              - key: EMAIL_PROVIDER_API_KEY
                sync: false
              - key: WHATSAPP_PROVIDER_API_KEY
                sync: false
              - key: SENTRY_DSN
                sync: false

          - type: cron
            runtime: docker
            name: rauchbar-worker-scrape-staging
            plan: starter
            region: frankfurt
            autoDeployTrigger: checksPass
            schedule: "*/15 * * * *"
            dockerContext: .
            dockerfilePath: ./apps/worker/Dockerfile
            dockerCommand: corepack pnpm --filter @rauchbar/worker start
            buildFilter:
              paths:
                - apps/worker/**
                - packages/deals-core/**
                - package.json
                - pnpm-workspace.yaml
                - tsconfig.base.json
            envVars:
              - fromGroup: rauchbar-staging-shared
              - key: PORT
                value: "8080"
              - key: WORKER_ROLE
                value: scrape
              - key: DATABASE_URL
                fromDatabase:
                  name: rauchbar-postgres-staging
                  property: connectionString
              - key: REDIS_HOST
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: host
              - key: REDIS_PORT
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: port
              - key: EMAIL_PROVIDER_API_KEY
                sync: false
              - key: WHATSAPP_PROVIDER_API_KEY
                sync: false

          - type: cron
            runtime: docker
            name: rauchbar-worker-digest-staging
            plan: starter
            region: frankfurt
            autoDeployTrigger: checksPass
            schedule: "0 7 * * 1"
            dockerContext: .
            dockerfilePath: ./apps/worker/Dockerfile
            dockerCommand: corepack pnpm --filter @rauchbar/worker start
            buildFilter:
              paths:
                - apps/worker/**
                - packages/notifications/**
                - packages/deals-core/**
                - package.json
                - pnpm-workspace.yaml
                - tsconfig.base.json
            envVars:
              - fromGroup: rauchbar-staging-shared
              - key: PORT
                value: "8080"
              - key: WORKER_ROLE
                value: digest
              - key: DATABASE_URL
                fromDatabase:
                  name: rauchbar-postgres-staging
                  property: connectionString
              - key: REDIS_HOST
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: host
              - key: REDIS_PORT
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: port
              - key: EMAIL_PROVIDER_API_KEY
                sync: false
              - key: WHATSAPP_PROVIDER_API_KEY
                sync: false

      - name: production
        envVarGroups:
          - name: rauchbar-production-shared
            envVars:
