# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
#
# Render Blueprint skeleton for Rauchbar MVP.
# This file encodes the environment, database, and key-value contract that can be
# maintained in this branch today. App service stanzas are intentionally omitted
# until the site/admin/worker runtime branches are merged, because this branch
# does not contain the corresponding Dockerfiles and verified start commands.

previews:
  generation: manual
  expireAfterDays: 5

projects:
  - name: rauchbar
    environments:
      - name: staging
        envVarGroups:
          - name: rauchbar-staging-shared
            envVars:
              - key: NODE_ENV
                value: production
              - key: APP_ENV
                value: staging
              - key: LOG_LEVEL
                value: info
              - key: ALLOW_REAL_EMAIL_SEND
                value: "false"
              - key: ALLOW_REAL_WHATSAPP_SEND
                value: "false"
              - key: SITE_BASE_URL
                value: https://staging.rauchbar.de
              - key: ADMIN_BASE_URL
                value: https://admin-staging.rauchbar.de
              - key: PUBLIC_APP_URL
                value: https://staging.rauchbar.de
              - key: SCRAPER_JOB_QUEUE
                value: scrape-staging
              - key: QUEUE_CONCURRENCY
                value: "2"
              - key: SESSION_SECRET
                generateValue: true
        databases:
          - name: rauchbar-postgres-staging
            databaseName: rauchbar
            user: rauchbar
            plan: basic-256mb
            region: frankfurt
            postgresMajorVersion: "18"
            ipAllowList: []
        services:
          - type: keyvalue
            name: rauchbar-redis-staging
            plan: starter
            region: frankfurt
            ipAllowList: []
          - type: web
            runtime: docker
            name: rauchbar-site-staging
            plan: starter
            region: frankfurt
            dockerfilePath: ./apps/site/Dockerfile
            dockerContext: .
            autoDeployTrigger: checksPass
            domains:
              - staging.rauchbar.de
            healthCheckPath: /health/ready
            envVars:
              - fromGroup: rauchbar-staging-shared
              - key: HOST
                value: 0.0.0.0
              - key: PORT
                value: "10000"
              - key: DATABASE_URL
                fromDatabase:
                  name: rauchbar-postgres-staging
                  property: connectionString
              - key: REDIS_URL
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: connectionString
              - key: REDIS_HOST
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: host
              - key: REDIS_PORT
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: port
          - type: web
            runtime: docker
            name: rauchbar-admin-staging
            plan: starter
            region: frankfurt
            dockerfilePath: ./apps/admin/Dockerfile
            dockerContext: ./apps/admin
            autoDeployTrigger: checksPass
            domains:
              - admin-staging.rauchbar.de
            healthCheckPath: /health/ready
            envVars:
              - fromGroup: rauchbar-staging-shared
              - key: HOST
                value: 0.0.0.0
              - key: PORT
                value: "10001"
              - key: DATABASE_URL
                fromDatabase:
                  name: rauchbar-postgres-staging
                  property: connectionString
              - key: REDIS_URL
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: connectionString
              - key: REDIS_HOST
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: host
              - key: REDIS_PORT
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: port
          - type: worker
            runtime: docker
            name: rauchbar-worker-staging
            plan: starter
            region: frankfurt
            dockerfilePath: ./apps/worker/Dockerfile
            dockerContext: .
            autoDeployTrigger: checksPass
            maxShutdownDelaySeconds: 120
            envVars:
              - fromGroup: rauchbar-staging-shared
              - key: HOST
                value: 0.0.0.0
              - key: PORT
                value: "8080"
              - key: WORKER_ROLE
                value: worker
              - key: DATABASE_URL
                fromDatabase:
                  name: rauchbar-postgres-staging
                  property: connectionString
              - key: REDIS_URL
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: connectionString
              - key: REDIS_HOST
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: host
              - key: REDIS_PORT
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-staging
                  property: port

      - name: production
        envVarGroups:
          - name: rauchbar-production-shared
            envVars:
              - key: NODE_ENV
                value: production
              - key: APP_ENV
                value: production
              - key: LOG_LEVEL
                value: info
              - key: ALLOW_REAL_EMAIL_SEND
                value: "true"
              - key: ALLOW_REAL_WHATSAPP_SEND
                value: "true"
              - key: SITE_BASE_URL
                value: https://rauchbar.de
              - key: ADMIN_BASE_URL
                value: https://admin.rauchbar.de
              - key: PUBLIC_APP_URL
                value: https://rauchbar.de
              - key: SCRAPER_JOB_QUEUE
                value: scrape-production
              - key: QUEUE_CONCURRENCY
                value: "4"
              - key: SESSION_SECRET
                generateValue: true
        databases:
          - name: rauchbar-postgres-production
            databaseName: rauchbar
            user: rauchbar
            plan: basic-1gb
            region: frankfurt
            postgresMajorVersion: "18"
            ipAllowList: []
        services:
          - type: keyvalue
            name: rauchbar-redis-production
            plan: starter
            region: frankfurt
            ipAllowList: []
          - type: web
            runtime: docker
            name: rauchbar-site-production
            plan: starter
            region: frankfurt
            dockerfilePath: ./apps/site/Dockerfile
            dockerContext: .
            autoDeployTrigger: off
            domains:
              - rauchbar.de
            healthCheckPath: /health/ready
            envVars:
              - fromGroup: rauchbar-production-shared
              - key: HOST
                value: 0.0.0.0
              - key: PORT
                value: "10000"
              - key: DATABASE_URL
                fromDatabase:
                  name: rauchbar-postgres-production
                  property: connectionString
              - key: REDIS_URL
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-production
                  property: connectionString
              - key: REDIS_HOST
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-production
                  property: host
              - key: REDIS_PORT
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-production
                  property: port
          - type: web
            runtime: docker
            name: rauchbar-admin-production
            plan: starter
            region: frankfurt
            dockerfilePath: ./apps/admin/Dockerfile
            dockerContext: ./apps/admin
            autoDeployTrigger: off
            domains:
              - admin.rauchbar.de
            healthCheckPath: /health/ready
            envVars:
              - fromGroup: rauchbar-production-shared
              - key: HOST
                value: 0.0.0.0
              - key: PORT
                value: "10001"
              - key: DATABASE_URL
                fromDatabase:
                  name: rauchbar-postgres-production
                  property: connectionString
              - key: REDIS_URL
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-production
                  property: connectionString
              - key: REDIS_HOST
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-production
                  property: host
              - key: REDIS_PORT
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-production
                  property: port
          - type: worker
            runtime: docker
            name: rauchbar-worker-production
            plan: starter
            region: frankfurt
            dockerfilePath: ./apps/worker/Dockerfile
            dockerContext: .
            autoDeployTrigger: off
            maxShutdownDelaySeconds: 120
            envVars:
              - fromGroup: rauchbar-production-shared
              - key: HOST
                value: 0.0.0.0
              - key: PORT
                value: "8080"
              - key: WORKER_ROLE
                value: worker
              - key: DATABASE_URL
                fromDatabase:
                  name: rauchbar-postgres-production
                  property: connectionString
              - key: REDIS_URL
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-production
                  property: connectionString
              - key: REDIS_HOST
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-production
                  property: host
              - key: REDIS_PORT
                fromService:
                  type: keyvalue
                  name: rauchbar-redis-production
                  property: port
